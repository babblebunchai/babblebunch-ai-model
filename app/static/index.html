<!DOCTYPE html>
<html>
<head>
  <title>Babblebunch AI – Speech Report</title>

  <style>
    body {
      font-family: "Segoe UI", Arial;
      background: linear-gradient(135deg, #f9fbff, #eef2ff);
      padding: 40px;
    }

    .card {
      background: white;
      max-width: 520px;
      margin: auto;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,.12);
      text-align: center;
    }

    h2 {
      color: #E63946;
      font-size: 28px;
      margin-bottom: 10px;
    }

    small {
      display: block;
      margin-bottom: 20px;
      color: #555;
      font-size: 16px;
    }

    input, button {
      width: 90%;
      padding: 14px;
      margin-top: 14px;
      border-radius: 10px;
      font-size: 16px;
    }

    input {
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #E63946;
      box-shadow: 0 0 0 2px rgba(230,57,70,0.15);
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.95;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .primary {
      background: #E63946;
      color: white;
    }

    .secondary {
      background: #457B9D;
      color: white;
    }

    .danger {
      background: #333;
      color: white;
    }

    .record-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 14px;
      background: #f4f6ff;
    }

    #timer {
      font-size: 18px;
      color: #E63946;
      margin-top: 12px;
      font-weight: bold;
    }

    #progressBox {
      display: none;
      margin-top: 20px;
    }

    #progressOuter {
      width: 100%;
      height: 18px;
      background: #e5e5e5;
      border-radius: 12px;
      overflow: hidden;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff5a5f, #E63946);
      transition: width 0.4s ease;
    }

    #progressText {
      margin-top: 10px;
      font-size: 16px;
      color: #333;
    }

    #audioPreviewBox {
      display: none;
      margin-top: 18px;
      padding: 14px;
      background: #fafafa;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    #successMsg {
      display: none;
      margin-top: 18px;
      color: green;
      font-weight: bold;
      font-size: 16px;
    }

    #hintText {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Babblebunch AI</h2>
  <small>Child Speech Analysis Report</small>

  <input id="childName" placeholder="Child Name">

  <input type="file" id="fileInput" accept="audio/*,video/*" onchange="previewUploadedAudio()">

  <div id="audioPreviewBox">
    <div><b>🎧 Audio Preview</b></div>
    <audio id="audioPreview" controls></audio>
  </div>

  <div class="record-box">
    <button class="secondary" id="startBtn" onclick="startRecording()">Start</button>
    <button class="danger" id="stopBtn" onclick="stopRecording()">Stop</button>
    <div id="timer">00:00</div>
    <div id="hintText">Tip: Best results usually come from 8–20 seconds of clear speech.</div>
  </div>

  <div id="progressBox">
    <div id="progressOuter">
      <div id="progressBar"></div>
    </div>
    <div id="progressText"></div>
  </div>

  <div id="successMsg">✅ Report downloaded successfully. Ready for new report.</div>

  <button id="generateBtn" class="primary" onclick="submitAudio()">
    Generate Report
  </button>

</div>

<script>
let recorder;
let mediaStream = null;
let audioChunks = [];
let timerInterval;
let seconds = 0;
let isRecording = false;
let isProcessing = false;
let recordedBlob = null;
let currentPreviewURL = null;
const MAX_RECORD_SECONDS = 20;

// =========================
// TIMER FORMAT
// =========================
function formatTime(sec) {
  const mins = String(Math.floor(sec / 60)).padStart(2, "0");
  const secs = String(sec % 60).padStart(2, "0");
  return `${mins}:${secs}`;
}

// =========================
// SAFE PREVIEW URL CLEANUP
// =========================
function clearPreviewURL() {
  if (currentPreviewURL) {
    URL.revokeObjectURL(currentPreviewURL);
    currentPreviewURL = null;
  }
}

// =========================
// START RECORDING
// =========================
async function startRecording() {
  if (isRecording || isProcessing) return;

  try {
    // If uploaded file exists, clear it before recording
    document.getElementById("fileInput").value = "";
    clearPreviewURL();

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaStream = stream;

    recorder = new MediaRecorder(stream);
    audioChunks = [];
    recordedBlob = null;

    recorder.ondataavailable = e => {
      if (e.data.size > 0) {
        audioChunks.push(e.data);
      }
    };

    recorder.onstop = () => {
      recordedBlob = new Blob(audioChunks, { type: "audio/webm" });
      currentPreviewURL = URL.createObjectURL(recordedBlob);

      document.getElementById("audioPreviewBox").style.display = "block";
      document.getElementById("audioPreview").src = currentPreviewURL;
    };

    recorder.start();
    isRecording = true;
    seconds = 0;
    document.getElementById("timer").innerText = "00:00";

    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById("timer").innerText = formatTime(seconds);

      // Auto-stop at max duration
      if (seconds >= MAX_RECORD_SECONDS) {
        stopRecording();
      }
    }, 1000);

  } catch (err) {
    alert("Microphone access denied");
    console.error(err);
  }
}

// =========================
// STOP RECORDING
// =========================
function stopRecording() {
  if (!recorder || !isRecording) return;

  recorder.stop();
  clearInterval(timerInterval);
  isRecording = false;

  if (mediaStream) {
    mediaStream.getTracks().forEach(track => track.stop());
    mediaStream = null;
  }
}

// =========================
// PREVIEW UPLOADED AUDIO
// =========================
function previewUploadedAudio() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return;

  // If user uploads file, clear recorded blob
  recordedBlob = null;
  audioChunks = [];

  clearPreviewURL();
  currentPreviewURL = URL.createObjectURL(file);

  document.getElementById("audioPreviewBox").style.display = "block";
  document.getElementById("audioPreview").src = currentPreviewURL;
}

// =========================
// PROGRESS BAR
// =========================
function updateProgress(percent, text) {
  document.getElementById("progressBox").style.display = "block";
  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText = text;
}

// =========================
// RESET PAGE AFTER SUCCESS
// =========================
function resetFormAfterSuccess() {
  document.getElementById("childName").value = "";
  document.getElementById("fileInput").value = "";
  document.getElementById("timer").innerText = "00:00";

  clearPreviewURL();

  audioChunks = [];
  recordedBlob = null;
  seconds = 0;
  isRecording = false;
  isProcessing = false;

  document.getElementById("audioPreview").src = "";
  document.getElementById("audioPreviewBox").style.display = "none";

  document.getElementById("progressBar").style.width = "0%";
  document.getElementById("progressText").innerText = "";
  document.getElementById("progressBox").style.display = "none";

  document.getElementById("generateBtn").disabled = false;
  document.getElementById("generateBtn").innerText = "Generate Report";
}

// =========================
// SUBMIT AUDIO
// =========================
async function submitAudio() {
  if (isProcessing || isRecording) return;

  const name = document.getElementById("childName").value.trim();
  let audioFile = document.getElementById("fileInput").files[0];

  if (!name) {
    alert("Please enter child name");
    return;
  }

  if (!audioFile && recordedBlob) {
    audioFile = new File([recordedBlob], "recorded_audio.webm", { type: "audio/webm" });
  }

  if (!audioFile) {
    alert("Please upload or record audio first");
    return;
  }

  isProcessing = true;

  const formData = new FormData();
  formData.append("child_name", name);
  formData.append("audio", audioFile);

  const btn = document.getElementById("generateBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";
  document.getElementById("successMsg").style.display = "none";

  updateProgress(10, "Uploading audio...");

  const progressSteps = [
    { percent: 25, text: "Converting audio..." },
    { percent: 45, text: "Transcribing speech..." },
    { percent: 65, text: "Analyzing speaking patterns..." },
    { percent: 85, text: "Generating PDF reports..." }
  ];

  let stepIndex = 0;
  const fakeProgress = setInterval(() => {
    if (stepIndex < progressSteps.length) {
      updateProgress(progressSteps[stepIndex].percent, progressSteps[stepIndex].text);
      stepIndex++;
    }
  }, 1800);

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    clearInterval(fakeProgress);

    if (!res.ok) {
      const errorText = await res.text();
      alert("Server Error: " + errorText);
      throw new Error("Backend failed");
    }

    updateProgress(100, "Done ✅");

    const blob = await res.blob();

    // Safe download
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${name}_Speech_Reports.zip`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    document.getElementById("successMsg").style.display = "block";

    setTimeout(() => {
      resetFormAfterSuccess();
    }, 2500);

  } catch (e) {
    console.error(e);
    alert("Error generating report");

    clearInterval(fakeProgress);
    updateProgress(0, "");

    document.getElementById("progressBox").style.display = "none";

    isProcessing = false;
    btn.disabled = false;
    btn.innerText = "Generate Report";
  }
}
</script>

</body>
</html>
